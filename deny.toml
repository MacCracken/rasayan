# cargo-deny configuration for rasayan
# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[advisories]
version = 2

[licenses]
version = 2
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "GPL-3.0-only",
    "AGPL-3.0-only",
    "LGPL-2.1-or-later",
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
